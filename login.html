<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Salone Safe Ride</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma;
            background: linear-gradient(135deg, #006400, #008000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
        }
        h1 { color: #006400; text-align: center; margin-bottom: 10px; }
        p { text-align: center; margin-bottom: 30px; color: #666; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #006400;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #006400; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🇸🇱 Welcome Back</h1>
        <p>Login to your account</p>

        <form method="POST" action="login_process.php">
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
</body>
</html>
